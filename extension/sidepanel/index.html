<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: system-ui; padding: 16px; }
      h1 { font-size: 16px; }
      pre { background: #f4f4f5; padding: 8px; border-radius: 6px; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>AI Shopping Copilot</h1>
    <div id="content">Open a product page…</div>
    <script>
      chrome.storage.local.get("lastProduct", ({ lastProduct }) => {
        if (lastProduct) {
          document.getElementById("content").innerHTML =
            "<pre>" + JSON.stringify(lastProduct, null, 2) + "</pre>";
        }
      });
    </script>
  </body>
</html>
